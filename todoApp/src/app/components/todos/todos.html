<h1>Todos</h1>                                                                                                                          
                                                                                         
  @if (error()) {
    <p>{{ error() }}</p>
  }                                                                                                                                       
 <form [formGroup]="form" (ngSubmit)="onSubmit()">                                                                                       
    <input formControlName="name" type="text" placeholder="New todo name" />             
    <button type="submit" [disabled]="form.invalid">Add</button>                                                                          
  </form>
  @if (loading()) {                                                                                                                       
    <p>Loading...</p>                                                                    
  } @else {
    <div>
    <button (click)="filter.set('all')"                                                                                                   
            [class.active]="filter() === 'all'">All</button>                                                                              
    <button (click)="filter.set('pending')" 
            [class.active]="filter() === 'pending'">Pending</button>                                                                      
    <button (click)="filter.set('completed')"                                                                                             
            [class.active]="filter() === 'completed'">Completed</button>
  </div>  
    <ul>
      @for (todo of filteredTodos(); track todo.id) {
        <li>
            <input type="checkbox"                                                               
           [checked]="todo.isComplete" 
           (change)="toggleComplete(todo)" />
          <span [class.completed]="todo.isComplete">{{ todo.name }}</span>
          <button (click)="deleteTodo(todo)">Delete</button>
        </li>                                                                                                                             
      }
      @empty {                                                                                                                            
        <li>No todos yet.</li>                                                                                                            
      }
    </ul>                                                                                                                                 
  }
