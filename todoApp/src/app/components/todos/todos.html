<h1>Todos</h1>                                                                                                                          
                                                                                         
  @if (error()) {
    <p>{{ error() }}</p>
  }                                                                                                                                       
 <form [formGroup]="form" (ngSubmit)="onSubmit()">                                                                                       
    <input formControlName="name" type="text" placeholder="New todo name" />             
    <button type="submit" [disabled]="form.invalid">Add</button>                                                                          
  </form>
  @if (loading()) {                                                                                                                       
    <p>Loading...</p>                                                                    
  } @else {
    <ul>
      @for (todo of todos(); track todo.id) {
        <li>
            <input type="checkbox"                                                               
           [checked]="todo.isComplete" 
           (change)="toggleComplete(todo)" />
          <span [class.completed]="todo.isComplete">{{ todo.name }}</span>
          <button (click)="deleteTodo(todo)">Delete</button>
        </li>                                                                                                                             
      }
      @empty {                                                                                                                            
        <li>No todos yet.</li>                                                                                                            
      }
    </ul>                                                                                                                                 
  }
